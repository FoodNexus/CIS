<div class="min-h-screen bg-gray-50 flex flex-col">
  <nav *ngIf="!isAuthPage()" class="bg-white shadow-md z-[60] relative border-b border-gray-100">
    <div class="w-full px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center min-w-0">
          <button
            type="button"
            *ngIf="isLoggedIn()"
            (click)="toggleMobileMenu()"
            class="md:hidden -ml-0.5 p-2 rounded-lg text-gray-600 hover:text-emerald-700 hover:bg-emerald-50 focus:outline-none focus:ring-2 focus:ring-emerald-500 mr-1 shrink-0"
            [attr.aria-expanded]="mobileMenuOpen"
            aria-label="Menu">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
          <a routerLink="/dashboard" class="flex-shrink-0 flex items-center min-w-0">
            <h1 class="text-lg sm:text-xl font-bold text-emerald-600 truncate">Civic Platform</h1>
          </a>
        </div>
        <div class="flex items-center space-x-4">
          <div *ngIf="isLoggedIn()" class="hidden md:flex items-center">
            <app-badge [badge]="(currentUser$ | async)?.badge" [awardedDate]="(currentUser$ | async)?.awardedDate"></app-badge>
          </div>
          <div class="relative" *ngIf="isLoggedIn()">
            <button (click)="toggleUserMenu()" class="flex items-center text-sm rounded-full focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500">
              <span class="sr-only">Open user menu</span>
              <div class="h-8 w-8 rounded-full bg-emerald-600 flex items-center justify-center text-white font-medium shadow-sm ring-2 ring-white">
                {{ (currentUser$ | async)?.userName?.charAt(0).toUpperCase() }}
              </div>
            </button>
            <div *ngIf="isUserMenuOpen" class="absolute right-0 z-[70] mt-2 w-48 rounded-xl shadow-lg bg-white ring-1 ring-gray-200">
              <div class="py-1">
                <a routerLink="/dashboard" (click)="closeUserMenu()" class="block px-4 py-2 text-sm text-gray-700 hover:bg-emerald-50">Dashboard</a>
                <a routerLink="/profile" (click)="closeUserMenu()" class="block px-4 py-2 text-sm text-gray-700 hover:bg-emerald-50">Profile</a>
                <div class="border-t border-gray-100"></div>
                <button (click)="logout()" class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-emerald-50">Sign out</button>
              </div>
            </div>
          </div>
          <div *ngIf="!isLoggedIn()" class="flex space-x-4">
            <a routerLink="/login" class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-emerald-700 shadow-sm">Login</a>
            <a routerLink="/register" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-green-700 shadow-sm">Register</a>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- Mobile sidebar backdrop -->
  <div
    *ngIf="isLoggedIn() && !isAuthPage() && mobileMenuOpen"
    class="fixed inset-0 z-40 bg-black/40 md:hidden"
    (click)="closeMobileMenu()"></div>

  <div class="flex flex-1 min-h-0">
    <!-- Collapsible sidebar (reference: chevron + icon rail / expanded labels) -->
    <aside
      *ngIf="isLoggedIn() && !isAuthPage()"
      class="flex flex-col shrink-0 border-r border-gray-200 bg-white overflow-hidden
             transition-[transform,width] duration-300 ease-out
             fixed z-50 top-16 left-0 bottom-0 w-[min(18rem,88vw)]
             md:relative md:top-auto md:z-auto md:bottom-auto md:shadow-none md:rounded-none
             md:min-h-0
             -translate-x-full md:translate-x-0
             shadow-[4px_0_24px_rgba(0,0,0,0.08)] md:shadow-none"
      [class.translate-x-0]="mobileMenuOpen"
      [ngClass]="sidebarCollapsed ? 'md:w-16' : 'md:w-60'">

      <!-- Brand row + collapse chevron (reference-style; emerald theme) -->
      <div class="flex items-center gap-1 h-14 px-2 border-b border-emerald-100/80 bg-gradient-to-r from-emerald-50/90 to-white shrink-0">
        <div class="flex items-center gap-2 min-w-0 flex-1 overflow-hidden">
          <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-emerald-500 to-emerald-700 flex items-center justify-center text-white font-bold text-xs shadow-sm shrink-0 ring-2 ring-emerald-100">
            CP
          </div>
          <div class="min-w-0 md:hidden">
            <div class="text-sm font-bold text-gray-900 leading-tight truncate">Civic Platform</div>
            <div class="text-[10px] font-semibold text-emerald-700 uppercase tracking-wider">Navigation</div>
          </div>
          <div class="min-w-0 hidden md:block overflow-hidden" *ngIf="!sidebarCollapsed">
            <div class="text-sm font-bold text-gray-900 leading-tight truncate">Civic Platform</div>
            <div class="text-[10px] font-semibold text-emerald-700 uppercase tracking-wider">Navigation</div>
          </div>
        </div>
        <button
          type="button"
          (click)="toggleSidebarCollapsed()"
          class="hidden md:flex p-1.5 rounded-lg text-emerald-700 hover:bg-emerald-100/80 transition-colors shrink-0"
          [attr.aria-label]="sidebarCollapsed ? 'Développer le menu' : 'Réduire le menu'"
          title="Réduire / développer">
          <svg class="w-5 h-5 transition-transform duration-300" [class.rotate-180]="sidebarCollapsed" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
          </svg>
        </button>
      </div>

      <nav class="flex-1 overflow-y-auto py-3 px-2 space-y-0.5">
        <p class="px-2 pt-1 pb-2 text-[10px] font-bold text-gray-400 uppercase tracking-wider hidden md:block" [class.md:hidden]="sidebarCollapsed">Menu</p>

        <a
          routerLink="/dashboard"
          routerLinkActive="bg-emerald-50 text-emerald-900 border-emerald-600 shadow-sm font-semibold"
          [routerLinkActiveOptions]="{exact: true}"
          (click)="closeMobileMenu()"
          title="Dashboard"
          class="flex items-center gap-3 px-2 py-2.5 rounded-r-lg text-sm font-medium border-l-4 border-transparent text-gray-600 hover:bg-emerald-50 hover:text-emerald-900 transition-colors"
          [class.md:justify-center]="sidebarCollapsed"
          [class.md:gap-0]="sidebarCollapsed">
          <svg class="w-5 h-5 shrink-0 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
          <span class="truncate max-md:inline" [class.md:hidden]="sidebarCollapsed">Dashboard</span>
        </a>
        <a routerLink="/campaigns" routerLinkActive="bg-emerald-50 text-emerald-900 border-emerald-600 shadow-sm font-semibold" (click)="closeMobileMenu()" title="Campagnes" class="flex items-center gap-3 px-2 py-2.5 rounded-r-lg text-sm font-medium border-l-4 border-transparent text-gray-600 hover:bg-emerald-50 hover:text-emerald-900 transition-colors" [class.md:justify-center]="sidebarCollapsed" [class.md:gap-0]="sidebarCollapsed">
          <svg class="w-5 h-5 shrink-0 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z"/></svg>
          <span class="truncate max-md:inline" [class.md:hidden]="sidebarCollapsed">Campagnes</span>
        </a>
        <a routerLink="/my-posts" routerLinkActive="bg-emerald-50 text-emerald-900 border-emerald-600 shadow-sm font-semibold" (click)="closeMobileMenu()" title="Mes Posts" class="flex items-center gap-3 px-2 py-2.5 rounded-r-lg text-sm font-medium border-l-4 border-transparent text-gray-600 hover:bg-emerald-50 hover:text-emerald-900 transition-colors" [class.md:justify-center]="sidebarCollapsed" [class.md:gap-0]="sidebarCollapsed">
          <svg class="w-5 h-5 shrink-0 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          <span class="truncate max-md:inline" [class.md:hidden]="sidebarCollapsed">Mes Posts</span>
        </a>
        <a routerLink="/events" routerLinkActive="bg-emerald-50 text-emerald-900 border-emerald-600 shadow-sm font-semibold" (click)="closeMobileMenu()" title="Événements" class="flex items-center gap-3 px-2 py-2.5 rounded-r-lg text-sm font-medium border-l-4 border-transparent text-gray-600 hover:bg-emerald-50 hover:text-emerald-900 transition-colors" [class.md:justify-center]="sidebarCollapsed" [class.md:gap-0]="sidebarCollapsed">
          <svg class="w-5 h-5 shrink-0 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          <span class="truncate max-md:inline" [class.md:hidden]="sidebarCollapsed">Événements</span>
        </a>
        <a routerLink="/projects" routerLinkActive="bg-emerald-50 text-emerald-900 border-emerald-600 shadow-sm font-semibold" (click)="closeMobileMenu()" title="Projets" class="flex items-center gap-3 px-2 py-2.5 rounded-r-lg text-sm font-medium border-l-4 border-transparent text-gray-600 hover:bg-emerald-50 hover:text-emerald-900 transition-colors" [class.md:justify-center]="sidebarCollapsed" [class.md:gap-0]="sidebarCollapsed">
          <svg class="w-5 h-5 shrink-0 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
          <span class="truncate max-md:inline" [class.md:hidden]="sidebarCollapsed">Projets</span>
        </a>
        <a routerLink="/posts" routerLinkActive="bg-emerald-50 text-emerald-900 border-emerald-600 shadow-sm font-semibold" (click)="closeMobileMenu()" title="Publications" class="flex items-center gap-3 px-2 py-2.5 rounded-r-lg text-sm font-medium border-l-4 border-transparent text-gray-600 hover:bg-emerald-50 hover:text-emerald-900 transition-colors" [class.md:justify-center]="sidebarCollapsed" [class.md:gap-0]="sidebarCollapsed">
          <svg class="w-5 h-5 shrink-0 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-4v5l-5-5H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z"/></svg>
          <span class="truncate max-md:inline" [class.md:hidden]="sidebarCollapsed">Publications</span>
        </a>
        <a *ngIf="isAdmin()" routerLink="/metrics" routerLinkActive="bg-emerald-50 text-emerald-900 border-emerald-600 shadow-sm font-semibold" (click)="closeMobileMenu()" title="Métriques" class="flex items-center gap-3 px-2 py-2.5 rounded-r-lg text-sm font-medium border-l-4 border-transparent text-gray-600 hover:bg-emerald-50 hover:text-emerald-900 transition-colors" [class.md:justify-center]="sidebarCollapsed" [class.md:gap-0]="sidebarCollapsed">
          <svg class="w-5 h-5 shrink-0 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
          <span class="truncate max-md:inline" [class.md:hidden]="sidebarCollapsed">Métriques</span>
        </a>
      </nav>
    </aside>

    <main class="flex-1 min-w-0">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
