<div class="container mx-auto px-4 py-8">
  <a [routerLink]="backLink()" class="text-emerald-600 hover:text-emerald-800 mb-4 inline-block">← Back</a>
  
  <div *ngIf="isLoading" class="text-center py-8">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-emerald-600 mx-auto"></div>
  </div>

  <div *ngIf="errorMessage" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded mb-4">
    {{ errorMessage }}
  </div>

  <div *ngIf="user && !isLoading" class="bg-white shadow rounded-lg p-6">
    <div class="flex items-center mb-6 gap-4">
      <div class="h-20 w-20 rounded-full bg-emerald-100 flex items-center justify-center text-2xl overflow-hidden shrink-0 ring-2 ring-emerald-100">
        <img *ngIf="user.hasProfilePicture" [src]="avatarUrl(user)" [appZoomableImage]="avatarUrl(user)" alt=""
             class="h-full w-full object-cover" title="View photo" />
        <span *ngIf="!user.hasProfilePicture">{{ user.userName[0] | uppercase }}</span>
      </div>
      <div class="ml-6">
        <h1 class="text-2xl font-bold">{{ user.userName }}</h1>
        <p class="text-gray-600">{{ user.email }}</p>
      </div>
    </div>
    
    <div class="grid grid-cols-2 gap-4">
      <div><strong>Type:</strong> {{ user.userType }}</div>
      <div><strong>Platform admin:</strong> {{ user.isAdmin ? 'Yes' : 'No' }}</div>
      <div *ngIf="user.firstName"><strong>First Name:</strong> {{ user.firstName }}</div>
      <div *ngIf="user.lastName"><strong>Last Name:</strong> {{ user.lastName }}</div>
      <div *ngIf="user.phone"><strong>Phone:</strong> {{ user.phone }}</div>
    </div>
  </div>
</div>
