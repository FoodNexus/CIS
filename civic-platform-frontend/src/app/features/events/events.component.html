<div class="container mx-auto px-4 py-8">
  <h1 class="text-3xl font-bold mb-6">Events</h1>
  <div *ngIf="isLoading" class="text-center">Loading...</div>
  <div *ngIf="errorMessage" class="text-red-600">{{ errorMessage }}</div>
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    <div *ngFor="let event of events" class="bg-white shadow rounded-lg p-4">
      <h3 class="font-bold">{{ event.title }}</h3>
      <p class="text-sm text-gray-600">{{ event.date | date }}</p>
      <span class="px-2 py-1 rounded text-xs" [ngClass]="getStatusColor(event.status)">{{ event.status }}</span>
      <a [routerLink]="['/events', event.id]" class="block mt-2 text-emerald-600">View Details →</a>
    </div>
  </div>
</div>
