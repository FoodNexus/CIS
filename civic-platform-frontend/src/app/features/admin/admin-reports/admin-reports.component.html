<div class="min-h-screen bg-slate-100 px-4 py-8">
  <div class="max-w-3xl mx-auto rounded-2xl border border-slate-200 bg-white shadow-sm overflow-hidden">
    <div class="bg-slate-800 px-6 py-4 text-white">
      <p class="text-xs font-bold uppercase tracking-wider text-slate-300">Reports</p>
      <h1 class="text-xl font-bold">User activity export</h1>
      <p class="text-slate-300 text-sm mt-1">
        Exports include a branded cover, period summary, per-role tables (ID, name, username, email, registration date), and a summary page with counts and badge distribution.
      </p>
    </div>
    <div class="p-6 space-y-5">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <label class="block">
          <span class="text-xs font-semibold text-slate-600">From</span>
          <input type="date" [(ngModel)]="reportFrom"
                 class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2" />
        </label>
        <label class="block">
          <span class="text-xs font-semibold text-slate-600">To</span>
          <input type="date" [(ngModel)]="reportTo"
                 class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2" />
        </label>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <label class="block">
          <span class="text-xs font-semibold text-slate-600">User type (optional)</span>
          <select [(ngModel)]="reportType"
                  class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 bg-white">
            <option [ngValue]="''">All types</option>
            <option value="CITIZEN">CITIZEN</option>
            <option value="DONOR">DONOR</option>
            <option value="PARTICIPANT">PARTICIPANT</option>
            <option value="AMBASSADOR">AMBASSADOR</option>
          </select>
        </label>
        <label class="block">
          <span class="text-xs font-semibold text-slate-600">Format</span>
          <select [(ngModel)]="reportFormat"
                  class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 bg-white">
            <option value="pdf">PDF</option>
            <option value="csv">CSV</option>
          </select>
        </label>
      </div>
      <p *ngIf="reportError" class="text-sm text-red-600">{{ reportError }}</p>
      <button type="button" (click)="download()" [disabled]="reportDownloading"
              class="inline-flex items-center justify-center px-6 py-3 rounded-xl font-bold text-white bg-slate-800 hover:bg-slate-900 disabled:opacity-50 text-sm">
        {{ reportDownloading ? 'Generating…' : 'Download report' }}
      </button>
    </div>
  </div>
</div>
