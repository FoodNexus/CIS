services:
  db:
    image: mariadb:latest
    container_name: civic-platform-db-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: civic_platform
      MYSQL_USER: civic_user
      MYSQL_PASSWORD: civic_password
    ports:
      - "3307:3306"
    volumes:
      - dev_mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  back:
    image: teamsync-backend-dev:latest
    container_name: civic-platform-backend-dev
    restart: unless-stopped
    working_dir: /app
    command: sh -c "mvn -DskipTests spring-boot:run -Dspring-boot.run.arguments=--server.port=8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://db:3306/civic_platform
      SPRING_DATASOURCE_USERNAME: civic_user
      SPRING_DATASOURCE_PASSWORD: civic_password
      DB_PASSWORD: civic_password
      SPRING_FLYWAY_ENABLED: "false"
      # Match token `iss` claim emitted to browser clients.
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI:-http://localhost:8180/realms/foodnexus}
      # Container-only endpoint for downloading JWKS from host Keycloak.
      KEYCLOAK_JWK_SET_URI: ${KEYCLOAK_JWK_SET_URI:-http://host.docker.internal:8180/realms/foodnexus/protocol/openid-connect/certs}
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-cis-back}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-2Z7dNpwye1HkrXCB1IXu7ralwXuMapos}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./civic-platform-backend:/app
      - dev_m2:/root/.m2
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8080"

  front:
    image: teamsync-frontend-dev:latest
    container_name: civic-platform-frontend-dev
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run start -- --host 0.0.0.0 --port 4200"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./civic-platform-frontend:/app
      - dev_front_node_modules:/app/node_modules
      - dev_front_angular_cache:/app/.angular
    depends_on:
      - back
    ports:
      - "4200:4200"

volumes:
  dev_mariadb_data:
  dev_m2:
  dev_front_node_modules:
  dev_front_angular_cache:
