services:
  db:
    image: mariadb:latest
    container_name: civic-platform-db-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: civic_platform
      MYSQL_USER: civic_user
      MYSQL_PASSWORD: civic_password
    ports:
      - "3307:3306"
    volumes:
      - dev_mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  back:
    image: teamsync-backend-dev:latest
    container_name: civic-platform-backend-dev
    restart: unless-stopped
    working_dir: /app
    command: sh -c "mvn -DskipTests spring-boot:run -Dspring-boot.run.arguments=--server.port=8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://db:3306/civic_platform
      SPRING_DATASOURCE_USERNAME: civic_user
      SPRING_DATASOURCE_PASSWORD: civic_password
      DB_PASSWORD: civic_password
      ML_SERVICE_URL: ${ML_SERVICE_URL:-http://ml-service:8000}
      SPRING_FLYWAY_ENABLED: "false"
      # Match token `iss` claim emitted to browser clients.
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI:-http://localhost:8180/realms/foodnexus}
      # Container-only endpoint for downloading JWKS from host Keycloak.
      KEYCLOAK_JWK_SET_URI: ${KEYCLOAK_JWK_SET_URI:-http://host.docker.internal:8180/realms/foodnexus/protocol/openid-connect/certs}
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-cis-back}
      # Required: set in your shell or .env (no hardcoded fallback).
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET}
      # Optional fallback for dev: password grant with an admin user account.
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_ADMIN_PASSWORD_CLIENT_ID: ${KEYCLOAK_ADMIN_PASSWORD_CLIENT_ID:-admin-cli}
      KEYCLOAK_SYNC_ENABLED: ${KEYCLOAK_SYNC_ENABLED:-true}
      KEYCLOAK_SYNC_RUN_ON_STARTUP: ${KEYCLOAK_SYNC_RUN_ON_STARTUP:-true}
      KEYCLOAK_SYNC_INTERVAL_MS: ${KEYCLOAK_SYNC_INTERVAL_MS:-300000}
      KEYCLOAK_SYNC_BASE_URL: ${KEYCLOAK_SYNC_BASE_URL:-http://host.docker.internal:8180}
      KEYCLOAK_SYNC_REALM: ${KEYCLOAK_SYNC_REALM:-foodnexus}
      KEYCLOAK_SYNC_AUTH_REALM: ${KEYCLOAK_SYNC_AUTH_REALM:-master}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./civic-platform-backend:/app
      - dev_m2:/root/.m2
    depends_on:
      db:
        condition: service_healthy
      ml-service:
        condition: service_started
    ports:
      - "8081:8080"

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: civic-platform-ml-dev
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: civic_platform
      DB_USER: civic_user
      DB_PASSWORD: civic_password
      MODEL_PATH: /app/models/svd_model.pkl
      RETRAIN_INTERVAL_HOURS: "24"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - dev_ml_models:/app/models

  front:
    image: teamsync-frontend-dev:latest
    container_name: civic-platform-frontend-dev
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run start -- --host 0.0.0.0 --port 4200"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./civic-platform-frontend:/app
      - dev_front_node_modules:/app/node_modules
      - dev_front_angular_cache:/app/.angular
    depends_on:
      - back
    ports:
      - "4200:4200"

volumes:
  dev_mariadb_data:
  dev_m2:
  dev_front_node_modules:
  dev_front_angular_cache:
  dev_ml_models:
