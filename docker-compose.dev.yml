services:
  db:
    image: mariadb:latest
    container_name: teamsync-db-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: civic_platform
      MYSQL_USER: civic_user
      MYSQL_PASSWORD: civic_password
    ports:
      - "3307:3306"
    volumes:
      - dev_mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  back:
    image: teamsync-backend-dev:latest
    container_name: civic-platform-backend-dev
    restart: unless-stopped
    environment:
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: jdbc:mariadb://db:3306/civic_platform
      SPRING_DATASOURCE_USERNAME: civic_user
      SPRING_DATASOURCE_PASSWORD: civic_password
      DB_PASSWORD: civic_password
      # Optional in dev; set these if your Keycloak runs elsewhere.
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI:-http://keycloak-dev:8080/realms/cis}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8080"

  front:
    image: teamsync-frontend-dev:latest
    container_name: civic-platform-frontend-dev
    restart: unless-stopped
    depends_on:
      - back
    ports:
      - "4200:4200"

volumes:
  dev_mariadb_data:
