# Default 8082 avoids clashing with Docker Compose, which maps the backend to host port 8081.
# Override: SERVER_PORT=8081 mvn spring-boot:run
server:
  port: ${SERVER_PORT:8082}
  servlet:
    context-path: /api

spring:
  application:
    name: civic-platform-backend

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB
  
  # Use the SAME host/port/database as phpMyAdmin / your terminal client.
  # Docker Compose maps MariaDB to host port 3307 (see repo docker-compose.yml); default here is 3306 for a local install.
  # Example if your data is in Docker: export SPRING_DATASOURCE_URL=jdbc:mariadb://127.0.0.1:3307/civic_platform
  #   export SPRING_DATASOURCE_USERNAME=civic_user && export SPRING_DATASOURCE_PASSWORD=civic_password
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3306/civic_platform?createDatabaseIfNotExist=true}
    driver-class-name: org.mariadb.jdbc.Driver
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:root}}
    
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 10

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true
        
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            
  thymeleaf:
    cache: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/foodnexus}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://host.docker.internal:8180/realms/foodnexus/protocol/openid-connect/certs}
    
# CORS Configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

# Profile picture storage (per-user file: {id}.{ext})
app:
  public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:8082/api}
  frontend-url: ${APP_FRONTEND_URL:http://localhost:4200}
  keycloak:
    sync:
      enabled: ${KEYCLOAK_SYNC_ENABLED:false}
      run-on-startup: ${KEYCLOAK_SYNC_RUN_ON_STARTUP:true}
      interval-ms: ${KEYCLOAK_SYNC_INTERVAL_MS:300000}
      base-url: ${KEYCLOAK_SYNC_BASE_URL:http://host.docker.internal:8180}
      realm: ${KEYCLOAK_SYNC_REALM:foodnexus}
      auth-realm: ${KEYCLOAK_SYNC_AUTH_REALM:}
      client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:}
      client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:}
      username: ${KEYCLOAK_ADMIN_USERNAME:}
      password: ${KEYCLOAK_ADMIN_PASSWORD:}
      password-client-id: ${KEYCLOAK_ADMIN_PASSWORD_CLIENT_ID:admin-cli}
  invitation:
    rate:
      priority-threshold: ${INVITE_PRIORITY_THRESHOLD:72.0}
      standard-threshold: ${INVITE_STANDARD_THRESHOLD:45.0}
    food:
      min-composite: ${INVITE_FOOD_MIN_COMPOSITE:70.0}
      min-direct-invites: ${INVITE_FOOD_MIN_DIRECT:5}
      sms-followup-threshold: ${INVITE_FOOD_SMS_THRESHOLD:85.0}
      solidarity-campaign-ids: ${INVITE_FOOD_SOLIDARITY_CAMPAIGN_IDS:97001,97002,97003}
  upload:
    profile-dir: ${user.home}/.civic-platform/uploads/profile
    post-media-dir: ${user.home}/.civic-platform/uploads/post-media
    comment-media-dir: ${user.home}/.civic-platform/uploads/comment-media

ml:
  service:
    url: ${ML_SERVICE_URL:http://localhost:8000}
    timeout-seconds: ${ML_SERVICE_TIMEOUT_SECONDS:10}

# Logging
logging:
  level:
    com.civicplatform: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
